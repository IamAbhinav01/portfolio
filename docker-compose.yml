version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: portfolio-frontend
    ports:
      - '3000:3000'
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - portfolio-network

  backend:
    build:
      context: ./contact-form-backend
      dockerfile: Dockerfile
    container_name: portfolio-backend
    ports:
      - '5000:5000'
    restart: unless-stopped
    networks:
      - portfolio-network

networks:
  portfolio-network:
    driver: bridge
